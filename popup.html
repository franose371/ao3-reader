<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AO3 Reader 设置</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="popup-container">
  <h1>AO3 Reader</h1>

  <div class="setting-row">
    <label>点击翻页方向</label>
    <select id="swapLR">
      <option value="0">左=上一页, 右=下一页</option>
      <option value="1">左=下一页, 右=上一页</option>
    </select>
  </div>

  <div class="setting-row">
    <label>字号</label>
    <div class="btn-group">
      <button id="fontSizeDown">−</button>
      <span id="fontSizeVal">18</span>
      <button id="fontSizeUp">+</button>
    </div>
  </div>

  <div class="setting-row">
    <label>行高</label>
    <select id="lineHeight">
      <option value="1.5">1.5</option>
      <option value="1.8">1.8</option>
      <option value="2.0">2.0</option>
      <option value="2.2">2.2</option>
    </select>
  </div>

  <div class="setting-row">
    <label>上边距</label>
    <select id="marginTop">
      <option value="0">0px</option><option value="4">4px</option><option value="8">8px</option><option value="12">12px</option><option value="16">16px</option><option value="20">20px</option><option value="24">24px</option><option value="28">28px</option><option value="32">32px</option><option value="40">40px</option>
    </select>
  </div>
  <div class="setting-row">
    <label>下边距</label>
    <select id="marginBottom">
      <option value="0">0px</option><option value="4">4px</option><option value="8">8px</option><option value="12">12px</option><option value="16">16px</option><option value="20">20px</option><option value="24">24px</option><option value="28">28px</option><option value="32">32px</option><option value="40">40px</option>
    </select>
  </div>
  <div class="setting-row">
    <label>左边距</label>
    <select id="marginLeft">
      <option value="4">4px</option><option value="8">8px</option><option value="12">12px</option><option value="16">16px</option><option value="20">20px</option><option value="24">24px</option><option value="28">28px</option><option value="32">32px</option><option value="40">40px</option>
    </select>
  </div>
  <div class="setting-row">
    <label>右边距</label>
    <select id="marginRight">
      <option value="4">4px</option><option value="8">8px</option><option value="12">12px</option><option value="16">16px</option><option value="20">20px</option><option value="24">24px</option><option value="28">28px</option><option value="32">32px</option><option value="40">40px</option>
    </select>
  </div>

  <div class="setting-row">
    <label>主题</label>
    <select id="theme">
      <option value="light">浅色</option>
      <option value="sepia">护眼</option>
      <option value="dark">深色</option>
      <option value="custom">自定义</option>
    </select>
  </div>

  <div class="setting-row" id="colorRow" style="display:none">
    <label>背景色</label>
    <input type="text" id="customColor" placeholder="#f5f0e8"
      pattern="^#[0-9a-fA-F]{6}$"
      style="width:80px;padding:4px 6px;font-size:13px;border:1px solid #ccc;border-radius:4px;">
  </div>

  <button id="saveBtn" class="btn-primary">保存设置</button>
  <p class="hint">打开AO3作品页面，点击浮动按钮进入阅读模式</p>
</div>
<script src="popup.js"></script>
</body>
</html>
